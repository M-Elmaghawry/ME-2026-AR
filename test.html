<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار ملفات JSON</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f6f9; padding: 20px; direction: rtl; }
        h1 { color: #003060; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; margin-top: 20px; }
        .card { background: white; border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h2 { color: #0e86d4; margin: 0 0 10px; font-size: 1rem; border-bottom: 2px solid #e9ecef; padding-bottom: 8px; }
        .ok { color: #28a745; font-weight: 700; }
        .err { color: #dc3545; font-weight: 700; }
        pre { font-size: 0.75rem; max-height: 200px; overflow: auto; background: #f8f9fa; padding: 10px; border-radius: 6px; text-align: left; direction: ltr; white-space: pre-wrap; }
        .summary { text-align: center; margin: 20px 0; font-size: 1.2rem; font-weight: 700; color: #003060; }
    </style>
</head>
<body>
    <h1>صفحة اختبار ملفات JSON العربية</h1>
    <div class="summary" id="summary">جاري التحميل...</div>
    <div class="grid" id="output"></div>

    <script>
        const files = [
            { name: 'الهيرو', path: 'data/hero.json' },
            { name: 'الخبرة', path: 'data/experience.json' },
            { name: 'الخدمات', path: 'data/services.json' },
            { name: 'العملاء', path: 'data/clients.json' },
            { name: 'الدورات', path: 'data/courses.json' },
            { name: 'المشاريع', path: 'data/projects.json' },
            { name: 'الشهادات', path: 'data/certifications.json' },
            { name: 'المؤهلات', path: 'data/qualifications.json' },
            { name: 'التوصيات', path: 'data/testimonials.json' },
            { name: 'الأدوات', path: 'data/tools.json' },
            { name: 'برامج التدريب', path: 'data/training-courses.json' },
        ];

        async function testAll() {
            const output = document.getElementById('output');
            let passed = 0, failed = 0;

            for (const file of files) {
                const card = document.createElement('div');
                card.className = 'card';
                try {
                    const res = await fetch(file.path);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    const keys = Object.keys(data);
                    const firstKey = keys[0];
                    const count = Array.isArray(data[firstKey]) ? data[firstKey].length : '-';
                    card.innerHTML = `
                        <h2>✅ ${file.name} <small style="color:#6c757d">(${file.path})</small></h2>
                        <p class="ok">تم التحميل — عدد العناصر: <strong>${count}</strong></p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                    passed++;
                } catch (err) {
                    card.innerHTML = `
                        <h2>❌ ${file.name} <small style="color:#6c757d">(${file.path})</small></h2>
                        <p class="err">خطأ: ${err.message}</p>
                    `;
                    failed++;
                }
                output.appendChild(card);
            }

            document.getElementById('summary').textContent =
                `✅ نجح: ${passed} | ❌ فشل: ${failed} | الإجمالي: ${files.length}`;
        }

        testAll();
    </script>
</body>
</html>
